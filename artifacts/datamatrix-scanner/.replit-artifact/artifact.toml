kind = "web"
previewPath = "/"
title = "DataMatrix Quality Scanner"
version = "1.0.0"
id = "artifacts/datamatrix-scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22949

[services.development]
run = "pnpm --filter @workspace/datamatrix-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/datamatrix-scanner", "run", "build" ]
publicDir = "artifacts/datamatrix-scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22949"
BASE_PATH = "/"
